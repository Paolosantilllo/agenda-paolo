<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Paolo</title>

<style>

:root{
--bg:#f5efff;
--card:#ffffff;
--accent:#7b4bff;
--text:#111;
--muted:#6b7280;
--line:#e5e7eb;

--green:#34c759;
--yellow:#ffcc00;
--red:#ff3b30;
}

body{
margin:0;
font-family:-apple-system,system-ui;
background:var(--bg);
color:var(--text);
}

.topbar{
padding:16px;
border-bottom:1px solid var(--line);
background:white;
position:sticky;
top:0;
z-index:10;
}

.topbarRow{
display:flex;
justify-content:space-between;
align-items:center;
}

.title{
font-size:22px;
font-weight:800;
}

.btnIcon{
width:40px;
height:40px;
border-radius:12px;
border:none;
background:#f3f4f6;
font-size:18px;
cursor:pointer;
}

.monthRow{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin-top:8px;
}

.monthName{
font-weight:700;
}

.navBtn{
border:none;
background:none;
font-size:20px;
cursor:pointer;
}

.monthTotal{
text-align:center;
font-weight:700;
color:var(--accent);
font-size:13px;
margin-top:4px;
}

.container{
padding:16px;
}

.card{
background:var(--card);
border-radius:16px;
box-shadow:0 2px 10px rgba(0,0,0,.06);
overflow:hidden;
}

.weekdays{
display:grid;
grid-template-columns:repeat(7,1fr);
padding:10px;
font-size:12px;
color:var(--muted);
text-align:center;
border-bottom:1px solid var(--line);
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
padding:6px;
}

.day{
height:54px;
border-radius:12px;
margin:4px;
padding:6px;
position:relative;
cursor:pointer;
}

.day.today{
background:rgba(123,75,255,.15);
}

.day.selected{
outline:2px solid var(--accent);
}

.day.level-green{background:rgba(52,199,89,.2)}
.day.level-yellow{background:rgba(255,204,0,.25)}
.day.level-red{background:rgba(255,59,48,.25)}

.dayNumber{
font-size:14px;
font-weight:700;
}

.dayCount{
position:absolute;
right:6px;
top:6px;
font-size:11px;
padding:2px 6px;
border-radius:999px;
color:white;
font-weight:700;
}

.dayCount.level-green{background:var(--green)}
.dayCount.level-yellow{background:var(--yellow);color:black}
.dayCount.level-red{background:var(--red)}

.section{
margin-top:16px;
}

.sectionHeader{
display:flex;
justify-content:space-between;
align-items:center;
}

.eventList{
margin-top:8px;
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.06);
}

.eventRow{
display:flex;
justify-content:space-between;
padding:12px;
border-bottom:1px solid var(--line);
}

.pillTime{
background:rgba(123,75,255,.15);
padding:4px 8px;
border-radius:999px;
font-size:12px;
font-weight:700;
}

.smallBtn{
border:none;
padding:6px 8px;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

.smallBtn.gray{background:#eee}
.smallBtn.danger{background:#ffdada}

.modalBack{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
display:none;
align-items:flex-end;
}

.modal{
background:white;
width:100%;
border-radius:20px 20px 0 0;
padding:16px;
}

.fieldLabel{
font-size:12px;
color:var(--muted);
margin-top:10px;
}

.input{
width:100%;
padding:10px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

.primary{
margin-top:12px;
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:var(--accent);
color:white;
font-weight:700;
cursor:pointer;
}

.fab{
position:fixed;
bottom:20px;
right:20px;
width:56px;
height:56px;
border-radius:18px;
background:var(--accent);
color:white;
font-size:30px;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<div class="topbar">

<div class="topbarRow">
<div class="title">Calendario</div>

<div>
<button class="btnIcon" onclick="toggleMoney()">€</button>
<button class="btnIcon" onclick="goToday()">•</button>
</div>
</div>

<div class="monthRow">
<button class="navBtn" onclick="prevMonth()">‹</button>
<div class="monthName" id="monthName"></div>
<button class="navBtn" onclick="nextMonth()">›</button>
</div>

<div id="monthTotal" class="monthTotal"></div>

</div>

<div class="container">

<div class="card">
<div class="weekdays">
<div>Lun</div><div>Mar</div><div>Mer</div>
<div>Gio</div><div>Ven</div><div>Sab</div><div>Dom</div>
</div>

<div class="grid" id="calendarGrid"></div>
</div>

<div class="section">

<div class="sectionHeader">
<h3 id="selectedLabel">Appuntamenti</h3>
<div id="selectedTotal"></div>
</div>

<div class="eventList" id="eventList"></div>

</div>

</div>

<button class="fab" onclick="openAddModal()">+</button>

<div class="modalBack" id="modalBack">
<div class="modal">

<div class="fieldLabel">Data</div>
<input class="input" type="date" id="mData">

<div class="fieldLabel">Ora</div>
<input class="input" type="time" id="mOra">

<div class="fieldLabel">Cliente</div>
<input class="input" id="mCliente">

<div class="fieldLabel">Prezzo</div>
<input class="input" type="number" id="mPrezzo">

<button class="primary" onclick="saveModal()">Salva</button>

</div>
</div>

<script>

const KEY="agendaPaoloCalendarV1"
let events=JSON.parse(localStorage.getItem(KEY)||"[]")

let hideMoney=true
let viewDate=new Date()
let selectedDate=toISO(new Date())

function toISO(d){
return d.toISOString().slice(0,10)
}

function save(){
localStorage.setItem(KEY,JSON.stringify(events))
}

function toggleMoney(){
hideMoney=!hideMoney
render()
}

function goToday(){
viewDate=new Date()
selectedDate=toISO(new Date())
render()
}

function prevMonth(){
viewDate.setMonth(viewDate.getMonth()-1)
render()
}

function nextMonth(){
viewDate.setMonth(viewDate.getMonth()+1)
render()
}

function render(){

const grid=document.getElementById("calendarGrid")
grid.innerHTML=""

document.getElementById("monthName").innerText=
viewDate.toLocaleDateString("it",{month:"long",year:"numeric"})

let first=new Date(viewDate.getFullYear(),viewDate.getMonth(),1)
let start=new Date(first)
start.setDate(start.getDate()-((first.getDay()+6)%7))

for(let i=0;i<42;i++){

let d=new Date(start)
d.setDate(start.getDate()+i)

let iso=toISO(d)

let day=document.createElement("div")
day.className="day"

if(iso===toISO(new Date())) day.classList.add("today")
if(iso===selectedDate) day.classList.add("selected")

let remaining=countRemaining(iso)
let level=remaining>=7?"red":remaining>=4?"yellow":remaining>=1?"green":""

if(level) day.classList.add("level-"+level)

day.onclick=()=>{selectedDate=iso;render()}

day.innerHTML=`<div class="dayNumber">${d.getDate()}</div>
${remaining?`<div class="dayCount level-${level}">${remaining}</div>`:""}`

grid.appendChild(day)

}

renderEvents()

}

function countRemaining(date){

let list=events.filter(e=>e.date===date)

let now=new Date()

return list.filter(e=>{
let t=e.time.split(":")
let ev=new Date(date)
ev.setHours(t[0],t[1])
return ev>now
}).length

}

function renderEvents(){

const list=document.getElementById("eventList")
list.innerHTML=""

let dayEvents=events.filter(e=>e.date===selectedDate)

dayEvents.sort((a,b)=>a.time.localeCompare(b.time))

dayEvents.forEach(e=>{

let row=document.createElement("div")
row.className="eventRow"

row.innerHTML=`
<div>
<div class="pillTime">${e.time}</div>
<div>${e.cliente}</div>
<div>${hideMoney?"":("€ "+e.prezzo)}</div>
</div>

<div>
<button class="smallBtn gray" onclick="editEvent('${e.id}')">Modifica</button>
<button class="smallBtn danger" onclick="deleteEvent('${e.id}')">X</button>
</div>
`

list.appendChild(row)

})

}

function openAddModal(){

document.getElementById("modalBack").style.display="flex"

document.getElementById("mData").value=selectedDate
document.getElementById("mOra").value=""
document.getElementById("mCliente").value=""
document.getElementById("mPrezzo").value=""

}

function saveModal(){

let date=mData.value
let time=mOra.value
let cliente=mCliente.value
let prezzo=Number(mPrezzo.value)

if(!date||!time||!cliente) return

events.push({
id:Date.now(),
date,
time,
cliente,
prezzo
})

save()

modalBack.style.display="none"

render()

}

function deleteEvent(id){

events=events.filter(e=>e.id!=id)

save()
render()

}

document.getElementById("mOra").addEventListener("blur",()=>{
setTimeout(()=>mCliente.focus(),120)
})

render()

</script>

</body>
</html>
