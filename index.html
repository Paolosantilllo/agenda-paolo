<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda Paolo</title>

  <style>
    :root{
      --bg:#f2f2f7;
      --card:#ffffff;
      --text:#111;
      --muted:#6b7280;
      --line:#e5e7eb;
      --accent:#7b4bff;
      --danger:#ff3b30;
    }

    body{
      margin:0;
      font-family:-apple-system, system-ui, Arial;
      background:var(--bg);
      color:var(--text);
    }

    /* Top bar stile iOS */
    .topbar{
      position:sticky; top:0; z-index:10;
      background:rgba(242,242,247,.85);
      backdrop-filter: blur(12px);
      border-bottom:1px solid var(--line);
      padding:14px 14px 10px;
    }
    .topbarRow{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .title{
      font-size:22px; font-weight:800;
    }
    .btnIcon{
      width:42px; height:42px;
      border:none; border-radius:14px;
      background:var(--card);
      box-shadow: 0 1px 8px rgba(0,0,0,.06);
      font-size:22px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer;
    }
    .btnIcon:active{ transform: scale(.98); }

    .monthRow{
      display:flex; align-items:center; justify-content:center; gap:12px;
      margin-top:10px;
    }
    .monthName{
      font-size:18px; font-weight:800;
    }
    .navBtn{
      border:none; background:transparent; cursor:pointer;
      font-size:20px; padding:8px 10px; border-radius:12px;
    }
    .navBtn:hover{ background: rgba(0,0,0,.05); }

    /* Calendar grid */
    .container{
      padding: 12px 14px 90px;
      max-width: 880px;
      margin: 0 auto;
    }
    .card{
      background:var(--card);
      border-radius:18px;
      box-shadow: 0 1px 10px rgba(0,0,0,.06);
      overflow:hidden;
      border: 1px solid rgba(0,0,0,.04);
    }

    .weekdays{
      display:grid; grid-template-columns: repeat(7, 1fr);
      padding: 10px 10px 6px;
      color:var(--muted);
      font-size:12px;
      text-align:center;
      border-bottom:1px solid var(--line);
    }
    .grid{
      display:grid; grid-template-columns: repeat(7, 1fr);
      gap: 0;
      padding: 6px;
    }

    .day{
      height: 54px;
      border-radius: 14px;
      margin: 4px;
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
      padding: 8px 8px;
      cursor:pointer;
      position:relative;
      user-select:none;
    }
    .day:hover{ background: rgba(0,0,0,.04); }
    .day.other{ color: #b8b8c4; }
    .dayNumber{ font-weight:700; font-size:14px; }

    .day.selected{
      background: rgba(123,75,255,.12);
      outline: 2px solid rgba(123,75,255,.25);
    }
    .dotRow{
      position:absolute;
      left:8px;
      bottom:8px;
      display:flex;
      gap:4px;
    }
    .dot{
      width:6px; height:6px;
      border-radius:99px;
      background: var(--accent);
      opacity:.9;
    }

    /* Events list */
    .section{
      margin-top: 14px;
    }
    .sectionHeader{
      display:flex; align-items:center; justify-content:space-between;
      margin: 0 2px 8px;
    }
    .sectionHeader h2{
      margin:0;
      font-size:16px;
      font-weight:800;
    }
    .muted{ color:var(--muted); font-size:13px; }

    .eventList{
      background:var(--card);
      border-radius:18px;
      box-shadow: 0 1px 10px rgba(0,0,0,.06);
      border: 1px solid rgba(0,0,0,.04);
      overflow:hidden;
    }
    .eventRow{
      display:flex; align-items:center; justify-content:space-between;
      padding: 12px 12px;
      border-bottom:1px solid var(--line);
      gap:12px;
    }
    .eventRow:last-child{ border-bottom:none; }
    .eventLeft{
      display:flex; align-items:flex-start; gap:10px; min-width:0;
    }
    .pillTime{
      background: rgba(123,75,255,.12);
      color: #3f2db3;
      font-weight:800;
      font-size:12px;
      padding: 6px 10px;
      border-radius: 999px;
      white-space:nowrap;
    }
    .eventText{
      min-width:0;
    }
    .eventTitle{
      font-weight:800;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .eventSub{
      font-size:13px;
      color:var(--muted);
      margin-top:2px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .eventActions{
      display:flex; gap:8px;
    }
    .smallBtn{
      border:none; cursor:pointer;
      background: #111;
      color:#fff;
      padding: 8px 10px;
      border-radius: 12px;
      font-weight:700;
      font-size:13px;
    }
    .smallBtn.danger{ background: var(--danger); }
    .smallBtn.gray{ background: #e5e7eb; color:#111; }

    /* Modal */
    .modalBack{
      position:fixed; inset:0;
      background: rgba(0,0,0,.35);
      display:none;
      align-items:flex-end;
      z-index:100;
    }
    .modal{
      width:100%;
      background: var(--card);
      border-top-left-radius: 22px;
      border-top-right-radius: 22px;
      padding: 14px 14px 18px;
      box-shadow: 0 -10px 30px rgba(0,0,0,.2);
      max-height: 85vh;
      overflow:auto;
    }
    .modalHeader{
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom: 10px;
    }
    .modalTitle{
      font-size:16px; font-weight:900;
    }
    .closeBtn{
      border:none; background:#e5e7eb; border-radius: 12px;
      padding: 8px 10px; cursor:pointer; font-weight:800;
    }

    .fieldLabel{ font-size:12px; color:var(--muted); margin: 10px 0 6px; }
    .input{
      width:100%;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      font-size: 16px;
      box-sizing:border-box;
    }
    .primary{
      width:100%;
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      border:none;
      background: var(--accent);
      color:white;
      font-weight:900;
      font-size:16px;
      cursor:pointer;
    }
    .primary:disabled{ opacity:.6; cursor:not-allowed; }

    /* Floating + button */
    .fab{
      position:fixed;
      right: 16px;
      bottom: 20px;
      width: 56px;
      height: 56px;
      border-radius: 18px;
      border:none;
      background: var(--accent);
      color:#fff;
      font-size: 30px;
      font-weight:900;
      box-shadow: 0 10px 30px rgba(123,75,255,.35);
      cursor:pointer;
      z-index:50;
    }
    .fab:active{ transform: scale(.98); }

    @media (min-width: 720px){
      .modalBack{ align-items:center; justify-content:center; }
      .modal{ width: 520px; border-radius: 22px; }
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="topbarRow">
      <div class="title">Calendario</div>
      <button class="btnIcon" onclick="goToday()" title="Oggi">•</button>
    </div>

    <div class="monthRow">
      <button class="navBtn" onclick="prevMonth()">‹</button>
      <div class="monthName" id="monthName">—</div>
      <button class="navBtn" onclick="nextMonth()">›</button>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <div class="weekdays">
        <div>Lun</div><div>Mar</div><div>Mer</div><div>Gio</div><div>Ven</div><div>Sab</div><div>Dom</div>
      </div>
      <div class="grid" id="calendarGrid"></div>
    </div>

    <div class="section">
      <div class="sectionHeader">
        <h2 id="selectedLabel">Appuntamenti</h2>
        <div class="muted" id="selectedTotal">Totale: € 0.00</div>
      </div>

      <div class="eventList" id="eventList"></div>
      <div class="muted" style="margin-top:10px" id="emptyHint"></div>
    </div>
  </div>

  <button class="fab" onclick="openAddModal()" title="Aggiungi">+</button>

  <!-- MODAL -->
  <div class="modalBack" id="modalBack" onclick="closeModalIfBackdrop(event)">
    <div class="modal">
      <div class="modalHeader">
        <div class="modalTitle" id="modalTitle">Nuovo appuntamento</div>
        <button class="closeBtn" onclick="closeModal()">Chiudi</button>
      </div>

      <div class="fieldLabel">Data</div>
      <input class="input" type="date" id="mData">

      <div class="fieldLabel">Ora</div>
      <input class="input" type="time" id="mOra">

      <div class="fieldLabel">Cliente</div>
      <input class="input" type="text" id="mCliente" placeholder="Nome cliente">

      <div class="fieldLabel">Prezzo (€)</div>
      <input class="input" type="number" step="0.01" min="0" id="mPrezzo" placeholder="Es. 35">

      <button class="primary" id="saveBtn" onclick="saveModal()">Salva</button>
      <div class="muted" style="margin-top:10px;">I dati restano salvati sul tuo dispositivo (localStorage).</div>
    </div>
  </div>

<script>
  // ===== Storage =====
  const KEY = "agendaPaoloCalendarV1";
  let events = JSON.parse(localStorage.getItem(KEY) || "[]");
  // event = { id, date:'YYYY-MM-DD', time:'HH:MM', cliente, prezzo }

  // ===== State calendario =====
  const mesi = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
  let viewDate = new Date(); // mese mostrato
  let selectedDate = isoToday();

  // ===== Utils =====
  function isoToday(){
    const d = new Date();
    return toISO(d);
  }
  function toISO(d){
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const day = String(d.getDate()).padStart(2,"0");
    return `${y}-${m}-${day}`;
  }
  function parseISO(iso){
    const [y,m,d] = iso.split("-").map(Number);
    return new Date(y, m-1, d);
  }
  function euro(n){
    return (Number(n||0)).toFixed(2);
  }
  function save(){
    localStorage.setItem(KEY, JSON.stringify(events));
  }
  function uid(){
    return (crypto && crypto.randomUUID) ? crypto.randomUUID() : (Date.now()+"-"+Math.random().toString(16).slice(2));
  }

  // Lunedì come primo giorno (iOS in IT)
  function mondayIndex(jsDay){ // js: 0=Dom..6=Sab -> 0=Lun..6=Dom
    return (jsDay + 6) % 7;
  }

  // ===== Calendar render =====
  function render(){
    document.getElementById("monthName").innerText = `${mesi[viewDate.getMonth()]} ${viewDate.getFullYear()}`;

    const grid = document.getElementById("calendarGrid");
    grid.innerHTML = "";

    const first = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1);
    const firstDay = mondayIndex(first.getDay());
    const start = new Date(first);
    start.setDate(1 - firstDay); // inizio griglia

    // 6 settimane x 7 giorni = 42 celle
    for(let i=0;i<42;i++){
      const d = new Date(start);
      d.setDate(start.getDate()+i);

      const iso = toISO(d);
      const isOtherMonth = d.getMonth() !== viewDate.getMonth();
      const isSelected = iso === selectedDate;

      const dayEl = document.createElement("div");
      dayEl.className = "day" + (isOtherMonth ? " other":"") + (isSelected ? " selected":"");
      dayEl.onclick = () => { selectedDate = iso; render(); };

      dayEl.innerHTML = `<div class="dayNumber">${d.getDate()}</div>`;

      // pallini (max 3) se ci sono eventi in quel giorno
      const count = events.filter(e => e.date === iso).length;
      if(count > 0){
        const dots = document.createElement("div");
        dots.className = "dotRow";
        const show = Math.min(3, count);
        for(let k=0;k<show;k++){
          const dot = document.createElement("div");
          dot.className = "dot";
          dots.appendChild(dot);
        }
        dayEl.appendChild(dots);
      }

      grid.appendChild(dayEl);
    }

    renderEventsForSelectedDay();
  }

  // ===== Events list =====
  function renderEventsForSelectedDay(){
    const list = document.getElementById("eventList");
    const empty = document.getElementById("emptyHint");
    const label = document.getElementById("selectedLabel");
    const totalEl = document.getElementById("selectedTotal");

    const d = parseISO(selectedDate);
    label.innerText = `Appuntamenti • ${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`;

    const dayEvents = events
      .filter(e => e.date === selectedDate)
      .sort((a,b) => (a.time || "").localeCompare(b.time || ""));

    let total = dayEvents.reduce((s,e)=> s + Number(e.prezzo||0), 0);
    totalEl.innerText = `Totale: € ${euro(total)}`;

    list.innerHTML = "";
    if(dayEvents.length === 0){
      empty.innerText = "Nessun appuntamento per questo giorno. Premi + per aggiungere.";
      return;
    }
    empty.innerText = "";

    dayEvents.forEach(e => {
      const row = document.createElement("div");
      row.className = "eventRow";
      row.innerHTML = `
        <div class="eventLeft">
          <div class="pillTime">${e.time || "--:--"}</div>
          <div class="eventText">
            <div class="eventTitle">${escapeHtml(e.cliente || "Cliente")}</div>
            <div class="eventSub">€ ${euro(e.prezzo)}</div>
          </div>
        </div>
        <div class="eventActions">
          <button class="smallBtn gray" onclick="openEditModal('${e.id}')">Modifica</button>
          <button class="smallBtn danger" onclick="removeEvent('${e.id}')">Elimina</button>
        </div>
      `;
      list.appendChild(row);
    });
  }

  function removeEvent(id){
    if(!confirm("Vuoi eliminare questo appuntamento?")) return;
    events = events.filter(e => e.id !== id);
    save();
    render();
  }

  // ===== Modal add/edit =====
  let editingId = null;

  function openAddModal(){
    editingId = null;
    document.getElementById("modalTitle").innerText = "Nuovo appuntamento";
    document.getElementById("saveBtn").innerText = "Salva";

    document.getElementById("mData").value = selectedDate;
    document.getElementById("mOra").value = "";
    document.getElementById("mCliente").value = "";
    document.getElementById("mPrezzo").value = "";

    openModal();
  }

  function openEditModal(id){
    const e = events.find(x => x.id === id);
    if(!e) return;

    editingId = id;
    document.getElementById("modalTitle").innerText = "Modifica appuntamento";
    document.getElementById("saveBtn").innerText = "Salva modifiche";

    document.getElementById("mData").value = e.date;
    document.getElementById("mOra").value = e.time || "";
    document.getElementById("mCliente").value = e.cliente || "";
    document.getElementById("mPrezzo").value = e.prezzo ?? "";

    openModal();
  }

  function saveModal(){
    const date = document.getElementById("mData").value;
    const time = document.getElementById("mOra").value;
    const cliente = document.getElementById("mCliente").value.trim();
    const prezzo = Number(document.getElementById("mPrezzo").value);

    if(!date || !time || !cliente || !Number.isFinite(prezzo) || prezzo < 0){
      alert("Compila: data, ora, cliente e prezzo.");
      return;
    }

    if(editingId){
      const i = events.findIndex(e => e.id === editingId);
      if(i !== -1){
        events[i] = { ...events[i], date, time, cliente, prezzo };
      }
    } else {
      events.push({ id: uid(), date, time, cliente, prezzo });
    }

    save();
    selectedDate = date; // vai al giorno scelto
    viewDate = parseISO(date); // porta il mese giusto
    closeModal();
    render();
  }

  function openModal(){
    document.getElementById("modalBack").style.display = "flex";
  }
  function closeModal(){
    document.getElementById("modalBack").style.display = "none";
  }
  function closeModalIfBackdrop(evt){
    if(evt.target.id === "modalBack") closeModal();
  }

  // ===== Month navigation =====
  function prevMonth(){
    viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth()-1, 1);
    render();
  }
  function nextMonth(){
    viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 1);
    render();
  }
  function goToday(){
    const t = new Date();
    viewDate = new Date(t.getFullYear(), t.getMonth(), 1);
    selectedDate = toISO(t);
    render();
  }

  function escapeHtml(str){
    return String(str)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  // start
  render();
</script>

</body>
</html>
