<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Agenda Paolo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: -apple-system;
  background: #f4f4f4;
  padding: 20px;
}
h1 {
  text-align: center;
}
input, button {
  width: 100%;
  padding: 12px;
  margin: 5px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 16px;
}
button {
  background: #7b4bff;
  color: white;
  border: none;
}
table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}
th, td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
  text-align: center;
}
.total-box {
  margin-top: 20px;
  padding: 15px;
  background: white;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>Agenda</h1>

<input type="date" id="data">
<input type="time" id="ora">
<input type="text" id="cliente" placeholder="Nome cliente">
<input type="number" id="prezzo" placeholder="Prezzo €">

<button onclick="salva()">Salva Appuntamento</button>

<div class="total-box">
<strong>Totale Mese: € <span id="totaleMese">0</span></strong>
</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Ora</th>
<th>Cliente</th>
<th>Prezzo</th>
<th>Azioni</th>
</tr>
</thead>

<tbody id="lista"></tbody>
</table>

<script>
let appuntamenti = JSON.parse(localStorage.getItem("agendaPaolo")) || [];

function salva() {
let data = document.getElementById("data").value;
let ora = document.getElementById("ora").value;
let cliente = document.getElementById("cliente").value;
let prezzo = parseFloat(document.getElementById("prezzo").value);

if (!data || !ora || !cliente || !prezzo) return;

appuntamenti.push({data, ora, cliente, prezzo});

localStorage.setItem("agendaPaolo", JSON.stringify(appuntamenti));

document.getElementById("cliente").value = "";
document.getElementById("prezzo").value = "";
document.getElementById("ora").value = "";

aggiorna();
}

function elimina(index){
appuntamenti.splice(index,1);
localStorage.setItem("agendaPaolo", JSON.stringify(appuntamenti));
aggiorna();
}

function aggiorna(){

let lista = document.getElementById("lista");
lista.innerHTML = "";

let totale = 0;
let meseCorrente = new Date().getMonth();
let annoCorrente = new Date().getFullYear();

appuntamenti.forEach((a,index)=>{

let dataApp = new Date(a.data);

if(dataApp.getMonth()===meseCorrente && dataApp.getFullYear()===annoCorrente){
totale += a.prezzo;
}

lista.innerHTML += `
<tr>
<td>${a.data}</td>
<td>${a.ora}</td>
<td>${a.cliente}</td>
<td>€ ${a.prezzo}</td>
<td><button onclick="elimina(${index})">Elimina</button></td>
</tr>
`;

});

document.getElementById("totaleMese").innerText = totale.toFixed(2);

}

aggiorna();
</script>

</body>
</html>
