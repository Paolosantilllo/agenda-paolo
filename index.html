<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Paolo</title>

<link rel="apple-touch-icon" href="icon.png">

<style>
:root{
--bg:#f2f2f7;
--card:#ffffff;
--text:#111;
--muted:#6b7280;
--line:#e5e7eb;
--accent:#7b4bff;
--danger:#ff3b30;
}

body{
margin:0;
font-family:-apple-system,system-ui,Arial;
background:var(--bg);
color:var(--text);
}

/* TOP BAR */

.topbar{
position:sticky;
top:0;
background:rgba(242,242,247,.9);
backdrop-filter:blur(10px);
border-bottom:1px solid var(--line);
padding:14px;
z-index:10;
}

.topbarRow{
display:flex;
justify-content:space-between;
align-items:center;
}

.title{
font-size:22px;
font-weight:800;
}

.btnIcon{
width:40px;
height:40px;
border:none;
border-radius:12px;
background:white;
font-size:20px;
cursor:pointer;
}

/* MESE */

.monthRow{
display:flex;
justify-content:center;
align-items:center;
gap:12px;
margin-top:6px;
}

.monthName{
font-weight:800;
font-size:18px;
}

.navBtn{
border:none;
background:none;
font-size:20px;
cursor:pointer;
}

.monthTotal{
text-align:center;
margin-top:6px;
font-size:13px;
font-weight:800;
color:var(--accent);
}

/* CALENDARIO */

.container{
padding:12px;
}

.card{
background:var(--card);
border-radius:18px;
box-shadow:0 1px 10px rgba(0,0,0,.06);
overflow:hidden;
}

.weekdays{
display:grid;
grid-template-columns:repeat(7,1fr);
padding:10px;
font-size:12px;
color:var(--muted);
text-align:center;
border-bottom:1px solid var(--line);
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
padding:6px;
}

.day{
height:54px;
border-radius:12px;
margin:4px;
padding:6px;
position:relative;
cursor:pointer;
}

.day.selected{
background:rgba(123,75,255,.15);
}

.dayNumber{
font-weight:700;
font-size:14px;
}

.dayCount{
position:absolute;
right:6px;
top:6px;
font-size:11px;
background:var(--accent);
color:white;
border-radius:999px;
padding:2px 6px;
font-weight:800;
}

/* LISTA EVENTI */

.section{
margin-top:14px;
}

.sectionHeader{
display:flex;
justify-content:space-between;
}

.eventList{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 1px 10px rgba(0,0,0,.06);
}

.eventRow{
display:flex;
justify-content:space-between;
padding:12px;
border-bottom:1px solid var(--line);
}

.pillTime{
background:rgba(123,75,255,.15);
padding:4px 8px;
border-radius:999px;
font-size:12px;
font-weight:800;
}

.smallBtn{
border:none;
padding:6px 8px;
border-radius:10px;
cursor:pointer;
font-weight:700;
}

.smallBtn.gray{background:#eee}
.smallBtn.danger{background:#ffdada}

/* MODAL */

.modalBack{
position:fixed;
inset:0;
background:rgba(0,0,0,.35);
display:none;
align-items:flex-end;
}

.modal{
width:100%;
background:white;
border-radius:20px 20px 0 0;
padding:14px;
}

.fieldLabel{
font-size:12px;
color:var(--muted);
margin-top:10px;
}

.input{
width:100%;
padding:10px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

.primary{
width:100%;
margin-top:12px;
padding:12px;
border:none;
border-radius:12px;
background:var(--accent);
color:white;
font-weight:800;
cursor:pointer;
}

/* FAB */

.fab{
position:fixed;
right:16px;
bottom:20px;
width:56px;
height:56px;
border-radius:18px;
border:none;
background:var(--accent);
color:white;
font-size:30px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="topbar">

<div class="topbarRow">
<div class="title">Calendario</div>

<div>
<button class="btnIcon" onclick="toggleMoney()">€</button>
<button class="btnIcon" onclick="goToday()">•</button>
</div>
</div>

<div class="monthRow">
<button class="navBtn" onclick="prevMonth()">‹</button>
<div class="monthName" id="monthName"></div>
<button class="navBtn" onclick="nextMonth()">›</button>
</div>

<div class="monthTotal" id="monthTotal" style="display:none"></div>

</div>

<div class="container">

<div class="card">
<div class="weekdays">
<div>Lun</div><div>Mar</div><div>Mer</div>
<div>Gio</div><div>Ven</div><div>Sab</div><div>Dom</div>
</div>

<div class="grid" id="calendarGrid"></div>
</div>

<div class="section">

<div class="sectionHeader">
<h2 id="selectedLabel"></h2>
<div id="selectedTotal"></div>
</div>

<div class="eventList" id="eventList"></div>

</div>

</div>

<button class="fab" onclick="openAddModal()">+</button>

<div class="modalBack" id="modalBack">
<div class="modal">

<div class="fieldLabel">Data</div>
<input class="input" type="date" id="mData">

<div class="fieldLabel">Ora</div>
<input class="input" type="time" id="mOra">

<div class="fieldLabel">Cliente</div>
<input class="input" id="mCliente">

<div class="fieldLabel">Prezzo</div>
<input class="input" type="number" id="mPrezzo">

<button class="primary" onclick="saveModal()">Salva</button>

</div>
</div>

<script>

const KEY="agendaPaoloCalendarV1"
let events=JSON.parse(localStorage.getItem(KEY)||[])

let hideMoney=true
let viewDate=new Date()
let selectedDate=toISO(new Date())

function toISO(d){
return d.toISOString().slice(0,10)
}

function save(){
localStorage.setItem(KEY,JSON.stringify(events))
}

function toggleMoney(){
hideMoney=!hideMoney
render()
}

function goToday(){
viewDate=new Date()
selectedDate=toISO(new Date())
render()
}

function prevMonth(){
viewDate.setMonth(viewDate.getMonth()-1)
render()
}

function nextMonth(){
viewDate.setMonth(viewDate.getMonth()+1)
render()
}

function render(){

document.getElementById("monthName").innerText=
viewDate.toLocaleDateString("it",{month:"long",year:"numeric"})

const grid=document.getElementById("calendarGrid")
grid.innerHTML=""

let first=new Date(viewDate.getFullYear(),viewDate.getMonth(),1)
let start=new Date(first)
start.setDate(start.getDate()-((first.getDay()+6)%7))

for(let i=0;i<42;i++){

let d=new Date(start)
d.setDate(start.getDate()+i)

let iso=toISO(d)

let day=document.createElement("div")
day.className="day"

if(iso===selectedDate) day.classList.add("selected")

day.onclick=()=>{selectedDate=iso;render()}

let count=events.filter(e=>e.date===iso).length

day.innerHTML=`
<div class="dayNumber">${d.getDate()}</div>
${count?`<div class="dayCount">${count}</div>`:""}
`

grid.appendChild(day)

}

renderEvents()

}

function renderEvents(){

const list=document.getElementById("eventList")
list.innerHTML=""

let dayEvents=events.filter(e=>e.date===selectedDate)

dayEvents.sort((a,b)=>a.time.localeCompare(b.time))

dayEvents.forEach(e=>{

let row=document.createElement("div")
row.className="eventRow"

row.innerHTML=`
<div>
<div class="pillTime">${e.time}</div>
<div>${e.cliente}</div>
<div>${hideMoney?"":("€ "+e.prezzo)}</div>
</div>

<div>
<button class="smallBtn gray" onclick="editEvent('${e.id}')">Modifica</button>
<button class="smallBtn danger" onclick="deleteEvent('${e.id}')">X</button>
</div>
`

list.appendChild(row)

})

}

function openAddModal(){

modalBack.style.display="flex"

mData.value=selectedDate
mOra.value=""
mCliente.value=""
mPrezzo.value=""

}

function saveModal(){

let date=mData.value
let time=mOra.value
let cliente=mCliente.value
let prezzo=Number(mPrezzo.value)

if(!date||!time||!cliente) return

events.push({
id:Date.now(),
date,
time,
cliente,
prezzo
})

save()

modalBack.style.display="none"

render()

}

function deleteEvent(id){

events=events.filter(e=>e.id!=id)

save()
render()

}

/* ROTELLINA iPHONE → PASSA A CLIENTE DOPO "FINE" */

document.getElementById("mOra").addEventListener("blur",()=>{
setTimeout(()=>mCliente.focus(),150)
})

render()

</script>

</body>
</html>
