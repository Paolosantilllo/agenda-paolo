<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Paolo</title>

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">

<style>
:root{
--bg:#f5efff;
--card:#f8f3ff;
--text:#121018;
--muted:#6b7280;
--line:rgba(17,17,17,.08);

--accent:#7b4bff;
--danger:#ff3b30;

--green:#34c759;
--yellow:#ffcc00;
--red:#ff3b30;

--shadow:0 10px 30px rgba(17,12,34,.06);
--shadow2:0 1px 10px rgba(17,12,34,.05);
}

body{
margin:0;
font-family:-apple-system,system-ui,Arial;
background:var(--bg);
color:var(--text);
}

/* TOP BAR */

.topbar{
position:sticky;
top:0;
z-index:10;
background:rgba(245,239,255,.82);
backdrop-filter:blur(14px);
border-bottom:1px solid var(--line);
padding:14px 14px 10px;
}

.topbarRow{
display:flex;
align-items:center;
justify-content:space-between;
}

.title{
font-size:22px;
font-weight:900;
}

.btnIcon{
width:42px;
height:42px;
border:none;
border-radius:14px;
background:rgba(248,243,255,.9);
box-shadow:var(--shadow2);
font-size:20px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.btnIcon.moneyOff{opacity:.55;}

.monthRow{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
margin-top:10px;
}

.monthName{
font-size:18px;
font-weight:900;
}

.navBtn{
border:none;
background:transparent;
cursor:pointer;
font-size:20px;
padding:8px 10px;
border-radius:12px;
}

/* Totale mese */

.monthTotal{
text-align:center;
margin-top:6px;
font-size:13px;
font-weight:900;
color:var(--accent);
}

/* CALENDARIO */

.container{
padding:12px 14px 90px;
max-width:880px;
margin:auto;
}

.card{
background:rgba(248,243,255,.95);
border-radius:20px;
box-shadow:var(--shadow);
overflow:hidden;
border:1px solid rgba(17,17,17,.06);
}

.weekdays{
display:grid;
grid-template-columns:repeat(7,1fr);
padding:10px 10px 6px;
color:var(--muted);
font-size:12px;
text-align:center;
border-bottom:1px solid var(--line);
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
padding:6px;
}

.day{
height:56px;
border-radius:16px;
margin:4px;
padding:8px;
cursor:pointer;
position:relative;
}

.dayNumber{
font-weight:900;
font-size:14px;
}

.dayCount{
position:absolute;
right:6px;
top:6px;
font-size:11px;
font-weight:900;
color:white;
background:var(--accent);
padding:3px 6px;
border-radius:999px;
}

.dayTotalMini{
position:absolute;
left:6px;
bottom:6px;
font-size:11px;
font-weight:900;
color:var(--accent);
}

/* LISTA EVENTI */

.section{margin-top:14px;}

.sectionHeader{
display:flex;
align-items:center;
justify-content:space-between;
margin:0 2px 8px;
}

.sectionHeader h2{
margin:0;
font-size:16px;
font-weight:900;
}

.totalsLine{
font-size:13px;
font-weight:900;
color:var(--accent);
}

.eventList{
background:rgba(248,243,255,.95);
border-radius:20px;
box-shadow:var(--shadow);
border:1px solid rgba(17,17,17,.06);
overflow:hidden;
}

.eventRow{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px;
border-bottom:1px solid var(--line);
}

.eventLeft{
display:flex;
gap:10px;
}

.pillTime{
background:rgba(123,75,255,.14);
color:#3f2db3;
font-weight:900;
font-size:12px;
padding:6px 10px;
border-radius:999px;
}

.eventTitle{font-weight:900;}

.eventSub{
font-size:13px;
color:var(--muted);
}

.smallBtn{
border:none;
cursor:pointer;
padding:8px 10px;
border-radius:12px;
font-weight:900;
font-size:13px;
}

.smallBtn.gray{
background:rgba(123,75,255,.12);
color:#3f2db3;
}

.smallBtn.danger{
background:rgba(255,59,48,.12);
color:#c81e1e;
}

/* MODAL */

.modalBack{
position:fixed;
inset:0;
background:rgba(0,0,0,.35);
display:none;
align-items:flex-end;
}

.modal{
width:100%;
background:rgba(248,243,255,.98);
border-top-left-radius:24px;
border-top-right-radius:24px;
padding:14px 14px 18px;
}

.fieldLabel{
font-size:12px;
color:var(--muted);
margin:10px 0 6px;
font-weight:800;
}

.input{
width:100%;
padding:12px;
border-radius:14px;
border:1px solid rgba(17,17,17,.1);
font-size:16px;
}

.primary{
width:100%;
margin-top:12px;
padding:12px;
border-radius:14px;
border:none;
background:var(--accent);
color:white;
font-weight:900;
font-size:16px;
cursor:pointer;
}

/* FAB */

.fab{
position:fixed;
right:16px;
bottom:20px;
width:58px;
height:58px;
border-radius:20px;
background:linear-gradient(180deg,#7b4bff,#6237ff);
color:white;
font-size:30px;
font-weight:900;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<div class="topbar">

<div class="topbarRow">

<div class="title">Calendario</div>

<div style="display:flex;gap:10px;">
<button class="btnIcon" id="moneyBtn" onclick="toggleMoney()">€</button>
<button class="btnIcon" onclick="goToday()">•</button>
</div>

</div>

<div class="monthRow">
<button class="navBtn" onclick="prevMonth()">‹</button>
<div class="monthName" id="monthName"></div>
<button class="navBtn" onclick="nextMonth()">›</button>
</div>

<div class="monthTotal" id="monthTotal" style="display:none"></div>

</div>

<div class="container">

<div class="card">

<div class="weekdays">
<div>Lun</div><div>Mar</div><div>Mer</div><div>Gio</div><div>Ven</div><div>Sab</div><div>Dom</div>
</div>

<div class="grid" id="calendarGrid"></div>

</div>

<div class="section">

<div class="sectionHeader">
<h2 id="selectedLabel">Appuntamenti</h2>
<div class="totalsLine" id="selectedTotal"></div>
</div>

<div class="eventList" id="eventList"></div>

</div>

</div>

<button class="fab" onclick="openAddModal()">+</button>

<div class="modalBack" id="modalBack">

<div class="modal">

<div class="fieldLabel">Data</div>
<input class="input" type="date" id="mData">

<div class="fieldLabel">Ora</div>
<input class="input" type="time" id="mOra">

<div class="fieldLabel">Cliente</div>
<input class="input" id="mCliente">

<div class="fieldLabel">Prezzo</div>
<input class="input" type="number" id="mPrezzo">

<button class="primary" onclick="saveModal()">Salva</button>

</div>

</div>

<script>

const KEY="agendaPaoloCalendarV1"
let events=JSON.parse(localStorage.getItem(KEY)||"[]")

let hideMoney=true
let viewDate=new Date()
let selectedDate=toISO(new Date())

function toggleMoney(){hideMoney=!hideMoney;render()}

function euro(n){return(Number(n||0)).toFixed(2)}

function toISO(d){
const y=d.getFullYear()
const m=String(d.getMonth()+1).padStart(2,"0")
const day=String(d.getDate()).padStart(2,"0")
return`${y}-${m}-${day}`
}

function parseISO(i){
const[a,b,c]=i.split("-").map(Number)
return new Date(a,b-1,c)
}

function save(){localStorage.setItem(KEY,JSON.stringify(events))}

function render(){

document.getElementById("monthName").innerText=
viewDate.toLocaleDateString("it",{month:"long",year:"numeric"})

const grid=document.getElementById("calendarGrid")
grid.innerHTML=""

const first=new Date(viewDate.getFullYear(),viewDate.getMonth(),1)
const start=new Date(first)
start.setDate(first.getDate()-((first.getDay()+6)%7))

for(let i=0;i<42;i++){

const d=new Date(start)
d.setDate(start.getDate()+i)

const iso=toISO(d)

const day=document.createElement("div")
day.className="day"

day.onclick=()=>{selectedDate=iso;render()}

const count=events.filter(e=>e.date===iso).length

day.innerHTML=`
<div class="dayNumber">${d.getDate()}</div>
${count?`<div class="dayCount">${count}</div>`:""}
`

grid.appendChild(day)
}

renderEvents()

const monthTotal=events
.filter(e=>{
const d=parseISO(e.date)
return d.getMonth()===viewDate.getMonth()&&d.getFullYear()===viewDate.getFullYear()
})
.reduce((s,e)=>s+Number(e.prezzo||0),0)

const mEl=document.getElementById("monthTotal")
if(hideMoney)mEl.style.display="none"
else{
mEl.style.display="block"
mEl.innerText=`Totale mese: € ${euro(monthTotal)}`
}
}

function renderEvents(){

const list=document.getElementById("eventList")
list.innerHTML=""

const dayEvents=events
.filter(e=>e.date===selectedDate)
.sort((a,b)=>a.time.localeCompare(b.time))

const totalDay=dayEvents.reduce((s,e)=>s+Number(e.prezzo||0),0)

document.getElementById("selectedTotal").innerText=
`Giorno: ${hideMoney?"—":"€ "+euro(totalDay)}`

dayEvents.forEach(e=>{

const row=document.createElement("div")
row.className="eventRow"

row.innerHTML=`
<div class="eventLeft">
<div class="pillTime">${e.time}</div>
<div>
<div class="eventTitle">${e.cliente}</div>
<div class="eventSub">${hideMoney?"":"€ "+euro(e.prezzo)}</div>
</div>
</div>

<div>
<button class="smallBtn gray" onclick="editEvent('${e.id}')">Modifica</button>
<button class="smallBtn danger" onclick="deleteEvent('${e.id}')">Elimina</button>
</div>
`

list.appendChild(row)

})

}

function openAddModal(){
modalBack.style.display="flex"
mData.value=selectedDate
mOra.value=""
mCliente.value=""
mPrezzo.value=""
}

function saveModal(){

const date=mData.value
const time=mOra.value
const cliente=mCliente.value
const prezzo=Number(mPrezzo.value)

if(!date||!time||!cliente)return

events.push({id:Date.now(),date,time,cliente,prezzo})

save()
modalBack.style.display="none"
render()

}

function deleteEvent(id){
events=events.filter(e=>e.id!=id)
save()
render()
}

/* 👇 QUI LA MODIFICA CHE VOLEVI */

document.getElementById("mOra").addEventListener("blur",()=>{
setTimeout(()=>{
document.getElementById("mCliente").focus()
},150)
})

render()

</script>

</body>
</html>
